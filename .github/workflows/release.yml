name: Release new tag

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump for manual release (patch, minor, major)'
        required: false
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: read

jobs:
  manual-new-release:
    concurrency:
      group: manual-release-main
      cancel-in-progress: false
    uses: karloie/shipkit/.github/workflows/release.yml@f0f498eab0d416d2dc5d9e3439304cb971d216ba
    with:
      image: karloie/bastille
      event_name: ${{ github.event_name }}
      bump: ${{ inputs.bump }}
      tool_ref: f0f498eab0d416d2dc5d9e3439304cb971d216ba
      main_path: ./cmd/bastille
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
