name: Re-release latest tag

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  rerelease:
    concurrency:
      group: rerelease-latest
      cancel-in-progress: false
    uses: karloie/shipkit/.github/workflows/release.yml@f0f498eab0d416d2dc5d9e3439304cb971d216ba
    with:
      image: karloie/bastille
      mode: rerelease
      tool_ref: f0f498eab0d416d2dc5d9e3439304cb971d216ba
      main_path: ./cmd/bastille
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
